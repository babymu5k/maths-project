                'compound-measures': { objectives: '<li>Calculate speed, density and pressure using standard formulas</li><li>Convert between compound units (e.g. km/h to m/s, g/cm³ to kg/m³)</li><li>Solve problems involving compound measures in context</li><li>Use compound measures in multi-step problems with other topics</li>', concepts: '<p>Compound measures combine two or more base units. Key formulas: Speed = distance/time; Density = mass/volume; Pressure = force/area. Edexcel Higher tests using these formulas in all directions — find any variable given the other two. Unit conversions are critical: for speed, km/h to m/s = divide by 3.6 (or × 1000/3600). For density, g/cm³ to kg/m³ = multiply by 1000. Context problems include travel graphs, population density, and fluid pressure. These often appear in problem-solving questions requiring multiple steps and unit awareness.</p>', mistakes: '<li>Using the wrong formula — check whether the question asks for speed, density or pressure</li><li>Mixing units — ensure consistent units before calculating (e.g. time in hours, not minutes)</li><li>Converting compound units incorrectly — km/h to m/s involves dividing by 3.6, not 1000</li><li>Giving the answer in the wrong units — read the question for required units</li>', guidance: '<p>Write the formula in a triangle or as an equation. Substitute values with units. Convert units if necessary — Edexcel expects consistent units. For speed conversion: km/h ÷ 3.6 = m/s; m/s × 3.6 = km/h. For density: 1 g/cm³ = 1000 kg/m³. Show the conversion step clearly. Give answers with correct compound units (e.g. m/s, kg/m³, N/m²). Round to 3 sf unless the question specifies otherwise.</p>' },
                'venn-diagrams': { objectives: '<li>Construct and interpret Venn diagrams with two or three sets</li><li>Use Venn diagrams to calculate probabilities including conditional probability</li><li>Understand and use set notation including ∪ (union), ∩ (intersection), and complements</li><li>Solve problems involving Venn diagrams in context</li>', concepts: '<p>Venn diagrams show relationships between sets. Edexcel Higher tests completing Venn diagrams from given data (using the principle that total frequencies must match), finding probabilities from Venn diagrams, and using set notation. Key notation: A ∪ B (union — in A or B or both), A ∩ B (intersection — in both A and B), A\' (complement — not in A). Conditional probability: P(A|B) = P(A ∩ B)/P(B). Questions often involve given that statements requiring conditional probability. Three-set Venn diagrams appear at Grade 9.</p>', mistakes: '<li>Double-counting elements in the intersection when finding totals</li><li>Confusing ∪ (union) with ∩ (intersection) — or = union, and = intersection</li><li>Forgetting to include elements outside all sets when calculating probabilities from the whole sample space</li><li>Using the wrong denominator in conditional probability — it should be the total of the condition, not the overall total</li>', guidance: '<p>Fill in the intersection first, then work outward. Check that all numbers sum to the total. For three-set diagrams, start with the central intersection (all three), then the pairwise intersections, then the individual sets. Use the formula: P(A ∪ B) = P(A) + P(B) - P(A ∩ B). For conditional probability, identify the reduced sample space. Edexcel expects probabilities as fractions in simplest form. Draw the diagram clearly and label all regions.</p>' }
            };
            const c = content[t.id];
            if (!c) return '';
            return '<div class="content-block"><h4>Learning Objectives</h4><ul>' + c.objectives + '</ul></div>' +
                '<div class="content-block"><h4>Key Concepts</h4>' + c.concepts + '</div>' +
                '<div class="content-block"><h4>Common Mistakes</h4><ul>' + c.mistakes + '</ul></div>' +
                '<div class="content-block"><h4>Examination Guidance</h4>' + c.guidance + '</div>';
        }
        function setupTabs(container) {
            container.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    const targetTab = this.getAttribute('data-tab');
                    if (!targetTab) return;
                    container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    container.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                    this.classList.add('active');
                    const matchingPanel = container.querySelector('.tab-panel[data-tab="' + targetTab + '"]');
                    if (matchingPanel) matchingPanel.classList.remove('hidden');
                });
            });
        }
        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateProgress();
        render();
    </script>
</body>
</html>
