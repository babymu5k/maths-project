                'linear-graphs': { objectives: '<li>Plot straight-line graphs using a table of values</li><li>Recognise equations of the form y = mx + c</li><li>Understand that m is the gradient and c is the y-intercept</li><li>Use a graph to solve equations and find coordinates of intersection</li>', concepts: '<p>Linear graphs are a core algebra topic on Edexcel Foundation and Higher. You must be able to: complete a table of values for an equation like y = 2x + 3, plot the points, draw a straight line through them, and label it. The gradient (m) is the coefficient of x — it tells you how many units y changes when x increases by 1. The y-intercept (c) is where the line crosses the y-axis. Edexcel often asks you to use the graph to solve equations (e.g. use your graph to solve 2x + 3 = 8).</p>', mistakes: '<li>Plotting points incorrectly when x or y are negative — check the direction on each axis</li><li>Drawing a curved or broken line when it should be a straight line</li><li>Misreading the scale on the axes</li><li>Confusing gradient with y-intercept — gradient is the steepness, intercept is the crossing point on the y-axis</li>', guidance: '<p>Plot at least 3 points — if they do not form a straight line, one is wrong. Use a ruler to draw the line. Extend the line across the full grid. When using the graph to solve an equation, draw the appropriate horizontal or vertical line and read the intersection point carefully. Edexcel accepts answers within a small tolerance for graph reading.</p>' },
                'rearranging': { objectives: '<li>Rearrange simple formulae to change the subject</li><li>Use inverse operations to isolate the required variable</li><li>Rearrange formulae involving one or more operations</li><li>Substitute into and rearrange scientific and mathematical formulae</li>', concepts: '<p>Rearranging formulae (changing the subject) uses the same balance method as solving equations but with letters instead of numbers. For example, to make b the subject of a = b + c, subtract c from both sides: b = a - c. For a = bc, divide both sides by c: b = a/c. Edexcel tests this with both mathematical formulae and real-world formulae (e.g. v = u + at, F = ma, C = πd). Questions may require rearranging before substituting values.</p>', mistakes: '<li>Applying inverse operations in the wrong order — treat the variable you want as the unknown and undo operations around it</li><li>Forgetting to apply the operation to every term on both sides</li><li>Writing the final formula with the subject on the right instead of the left (both are acceptable but be consistent)</li><li>Rearranging incorrectly when the subject appears in more than one term — gather terms first</li>', guidance: '<p>Use the same rules as solving equations. Write each step on a new line. When the subject appears in the denominator (e.g. a = b/x), multiply both sides by x first. Edexcel awards method marks for correct algebraic manipulation even if the final form is not fully simplified. Always check by substituting values back into both versions.</p>' },
                'forming-expr': { objectives: '<li>Form algebraic expressions from word descriptions</li><li>Form equations from word problems and geometric diagrams</li><li>Translate real-life situations into algebraic notation</li><li>Solve the resulting equations to answer the original problem</li>', concepts: '<p>Forming expressions and equations bridges word problems and algebra. Edexcel questions describe a situation — you must identify the unknown, assign a letter, and write an expression or equation. Common contexts: ages (e.g. John is 5 years older than Mary), perimeters (side lengths given as expressions), angles in triangles, and costs (fixed + variable). After forming, you usually solve the equation to find the unknown value.</p>', mistakes: '<li>Misinterpreting "more than" vs "less than" — 5 more than x is x + 5</li><li>Forgetting to use brackets when a sum is multiplied (e.g. twice the sum of x and 3 = 2(x+3), not 2x+3)</li><li>Not defining the variable clearly — write "let x = ..."</li><li>Forming the correct equation but not solving it to answer the question</li>', guidance: '<p>Always define your variable: Let x be the number of... Read the problem carefully and build the expression step by step. In geometry questions, sketch the diagram and label sides/angles with the expressions. Edexcel awards method marks for correct formation even if solving contains errors. State the final answer in context with units.</p>' },
                'expand-double': { objectives: '<li>Expand double brackets using FOIL or the grid method</li><li>Expand and simplify expressions of the form (x + a)(x + b)</li><li>Expand brackets involving negative terms and coefficients</li><li>Apply double bracket expansion in context including quadratic expressions</li>', concepts: '<p>Expanding double brackets is a Grade 4-5 skill essential for quadratics. Using FOIL (First, Outer, Inner, Last) or a grid: (x + 3)(x + 5) = x² + 5x + 3x + 15 = x² + 8x + 15. The middle term is the sum of the constant terms (3 + 5 = 8), and the last term is their product (3 × 5 = 15). For (x - 3)(x + 5), the middle term is -3 + 5 = 2x, and the last term is -3 × 5 = -15. This topic leads directly into factorising quadratics.</p>', mistakes: '<li>Forgetting to multiply the outer and inner terms (only doing First and Last) — giving x² + 15 instead of x² + 8x + 15</li><li>Sign errors when multiplying negative numbers (e.g. (x - 3)(x - 5) = x² - 8x + 15, not x² - 8x - 15)</li><li>Not collecting the two x terms to simplify the final expression</li><li>Misapplying the shortcut: the middle term is sum, last is product — works for (x+a)(x+b) only when coefficients of x are both 1</li>', guidance: '<p>Use the grid method for reliability — draw a 2×2 grid, fill in each product, then add all four terms. Always collect like terms to give the final answer in the form ax² + bx + c. Edexcel awards marks for the correct four terms even if simplifying contains errors. When the coefficient of x is not 1 (e.g. (2x+3)(x+5)), the grid method is essential.</p>' },
                'factorising': { objectives: '<li>Factorise algebraic expressions by finding a common factor</li><li>Factorise expressions of the form ax + ay into a(x + y)</li><li>Factorise expressions with multiple common factors</li><li>Use factorising to solve problems and simplify expressions</li>', concepts: '<p>Factorising is the reverse of expanding brackets — putting brackets back in. To factorise, find the highest common factor (HCF) of all terms, write it outside the bracket, and put the remaining factors inside. For example, 6x + 9 = 3(2x + 3) because 3 is the HCF of 6x and 9. Edexcel tests both single-term factorisation and more complex cases. This skill is essential for solving quadratic equations and simplifying algebraic fractions at higher grades.</p>', mistakes: '<li>Taking out a factor but not the highest common factor (e.g. 6x + 12 = 3(2x + 4) instead of 6(x + 2))</li><li>Forgetting to divide all terms by the common factor</li><li>Factorising only the first term and leaving the last term unchanged</li><li>Not checking by expanding back — if you multiply out your brackets, you should get the original expression</li>', guidance: '<p>Always find the highest common factor of all terms (numbers and variables). Write it outside the bracket. Check your answer by expanding. Edexcel usually requires fully factorised form — if another factor can be taken out, marks may be lost. For expressions with multiple variables, find the HCF of each variable separately.</p>' },
                'solving-linear': { objectives: '<li>Solve linear equations with unknowns on both sides</li><li>Solve equations involving brackets</li><li>Solve equations with fractional coefficients</li><li>Form and solve linear equations from word problems</li>', concepts: '<p>Solving linear equations with unknowns on both sides is a key Grade 3-4 topic. Strategy: collect all x terms on one side and all constants on the other. For example, 5x + 3 = 2x + 12 → subtract 2x: 3x + 3 = 12 → subtract 3: 3x = 9 → divide by 3: x = 3. When brackets are involved, expand first. With fractions, multiply every term by the common denominator to clear fractions. Edexcel embeds these within geometry problems and word problems.</p>', mistakes: '<li>Adding instead of subtracting when moving terms (e.g. 5x + 3 = 2x + 12 becomes 7x + 3 = 12 instead of 3x + 3 = 12)</li><li>Forgetting to apply the operation to both sides</li><li>Dividing by the wrong number at the last step</li><li>Not expanding brackets before rearranging</li>', guidance: '<p>Show every step on a new line. For equations with unknowns on both sides, eliminate the smaller number of x first (to keep the coefficient positive). For fractional equations, multiply through by the LCM of the denominators. Edexcel awards method marks at each stage. Always check your solution by substituting back into the original equation.</p>' },
                'inequalities': { objectives: '<li>Represent inequalities on a number line using open and closed circles</li><li>Solve linear inequalities using the balance method</li><li>Understand that multiplying or dividing by a negative number reverses the inequality sign</li><li>List integer solutions that satisfy an inequality</li>', concepts: '<p>Inequalities compare expressions using &lt; (less than), &gt; (greater than), ≤ (less than or equal to), ≥ (greater than or equal to). Solving inequalities follows the same rules as solving equations, with one crucial difference: if you multiply or divide both sides by a negative number, you must flip the inequality sign. On a number line: open circle (○) for &lt; or &gt;; closed circle (●) for ≤ or ≥. Edexcel often asks for all integer solutions that satisfy an inequality (e.g. integers x such that -3 &lt; x ≤ 4).</p>', mistakes: '<li>Forgetting to flip the inequality sign when multiplying or dividing by a negative number</li><li>Using the wrong circle on a number line (open for &lt; and &gt;, closed for ≤ and ≥)</li><li>Writing the answer without the variable (e.g. writing 4 instead of x &lt; 4)</li><li>Not considering whether the number is included when listing integer solutions (check whether it is &lt; or ≤)</li>', guidance: '<p>Treat the inequality like an equation when solving, but remember the sign-flip rule with negative multiplication/division. Draw the number line carefully — Edexcel expects clear circles and correct arrow direction. When listing integers, work systematically from the lower bound to the upper bound, checking whether each endpoint is included. Show working steps even for simple inequalities.</p>' },
                'sequences': { objectives: '<li>Generate terms of a sequence given the nth term</li><li>Find the nth term of a linear (arithmetic) sequence</li><li>Recognise and continue sequences including geometric and special sequences (square, cube, triangular numbers)</li><li>Use sequences in pattern-based problems</li>', concepts: '<p>Edexcel tests sequences at Foundation with linear (arithmetic) sequences and simple non-linear sequences. A linear sequence has a constant difference between terms. The nth term formula is an ± b, where a is the common difference and b is the zeroth term (the term before the first). For example, sequence 5, 9, 13, 17... has nth term 4n + 1 (difference = 4, 5 - 4 = 1). Other sequences include geometric (× common ratio), square numbers (n²), cube numbers (n³), triangular numbers, and Fibonacci-style sequences.</p>', mistakes: '<li>Confusing the common difference with the nth term formula — the nth term is an + b, not just the difference</li><li>Using the wrong method to find b — subtract the difference from the first term to get b</li><li>Forgetting that the nth term formula must produce the first term when n=1, second when n=2 etc.</li><li>Assuming a sequence is linear without checking that differences are constant</li>', guidance: '<p>For linear sequences: find the common difference (a), then find b by working out what the 0th term would be (first term minus a). Check your nth term by testing n=1, n=2, n=3. Edexcel markschemes require the nth term in simplest algebraic form. For pattern questions, draw the next few patterns to help identify the rule.</p>' },
                'compound-area': { objectives: '<li>Calculate the area of compound shapes by splitting them into rectangles, triangles and other known shapes</li><li>Find missing dimensions on compound shapes using given measurements</li><li>Solve problems involving area of compound shapes in context</li><li>Calculate perimeters of compound shapes</li>', concepts: '<p>Compound shapes are formed by combining or cutting out basic shapes. To find the area: split the shape into rectangles, triangles, semicircles etc., find each area separately, then add (or subtract, if a shape has been cut out). Edexcel often presents these as L-shapes, T-shapes, or shapes with a rectangular section removed. You may need to work out missing side lengths first using the fact that opposite sides are equal in total. Area of compound shapes links to real-life contexts like floor plans and gardens.</p>', mistakes: '<li>Splitting the shape incorrectly so that pieces overlap or leave gaps</li><li>Forgetting to find missing dimensions before calculating area</li><li>Adding areas of cut-out portions instead of subtracting</li><li>Not including units or using the wrong units (cm² for area, not cm)</li>', guidance: '<p>Draw splitting lines clearly on the diagram. Label each part and write its area calculation separately. Show all working — Edexcel awards method marks for correct splitting and individual area calculations. Check that all dimensions used are correct and in the same units. Add areas at the end and state the total clearly with square units.</p>' },
                'circumference': { objectives: '<li>Calculate the circumference of a circle using C = πd and C = 2πr</li><li>Find the diameter or radius given the circumference</li><li>Calculate the perimeter of semicircles and quarter circles</li><li>Solve problems involving circumference in context</li>', concepts: '<p>Circumference is the perimeter of a circle. Edexcel requires you to use two equivalent formulas: C = πd (diameter) or C = 2πr (radius). π (pi) is approximately 3.14 or 3.142, but you should use the π button on your calculator for accuracy. For a semicircle, the perimeter = πr + 2r (curved part plus straight diameter). For a quarter circle, perimeter = (πr/2) + 2r. Context questions include wheels (distance per revolution), circular tracks, and fencing around circular gardens.</p>', mistakes: '<li>Confusing radius and diameter — diameter = 2 × radius</li><li>Using the wrong formula (C = πd, not πr or 2πd)</li><li>Forgetting to add the straight edge when finding the perimeter of a semicircle</li><li>Using 3.14 instead of the π button on calculator questions, leading to rounding errors</li>', guidance: '<p>Write the formula first, then substitute values. Use the π button on your calculator unless the question specifies otherwise. For semicircles and quarter circles, sketch the shape and mark both the curved and straight parts — Edexcel often asks for the perimeter (not just the arc length). Give final answers to 3 significant figures unless told otherwise.</p>' },
                'area-circles': { objectives: '<li>Calculate the area of a circle using A = πr²</li><li>Find the radius or diameter given the area of a circle</li><li>Calculate areas of semicircles and quarter circles</li><li>Solve problems involving area of circles in compound shapes</li>', concepts: '<p>The area of a circle uses A = πr². Note that r is squared first, then multiplied by π — a common error is to square πr together. To find the radius from area, divide by π first, then square root. For a semicircle, area = πr²/2; for a quarter circle, area = πr²/4. Edexcel tests area of circles both standalone and within compound shapes (add or subtract circular areas). Context questions include pizza comparisons, ponds in gardens, and painting circular surfaces.</p>', mistakes: '<li>Using the diameter instead of the radius in A = πr² (must halve diameter first)</li><li>Squaring π × r instead of just r — the formula is π × (r²), not (πr)²</li><li>Forgetting to halve the area for semicircles or quarter for quarter circles</li><li>Confusing area formula (πr²) with circumference formula (πd or 2πr)</li>', guidance: '<p>Always check whether you have the radius or diameter. If given diameter, halve it first. Square the radius, then multiply by π. For compound shapes, calculate each area separately and add or subtract as needed. Use the π button on your calculator for accuracy. State answers with correct units (cm², m² etc.) to 3 significant figures unless specified otherwise.</p>' },
                'volume-prisms': { objectives: '<li>Calculate the volume of a prism: area of cross-section × length</li><li>Calculate volumes of cuboids, cylinders and other right prisms</li><li>Find missing dimensions given the volume</li><li>Solve problems involving volume in context including capacity</li>', concepts: '<p>Volume measures the space inside a 3D shape. For any prism (uniform cross-section throughout), volume = area of cross-section × length. For a cuboid: V = l × w × h. For a cylinder: V = πr²h (cross-section is a circle). Edexcel tests both direct calculation and reverse problems (find height given volume). Context questions involve filling containers, water flow, and converting between volume units (cm³ to litres: 1000 cm³ = 1 litre). Note the difference between volume and surface area.</p>', mistakes: '<li>Confusing volume of a prism with surface area</li><li>Using the wrong area for the cross-section (ensure it is the face that runs through the whole prism)</li><li>Mixing units — if length is in cm and area in m², convert to consistent units first</li><li>Forgetting to halve for triangular prisms (cross-section is a triangle: ½ × base × height × length)</li>', guidance: '<p>Identify the cross-section first — it is the shape that stays the same throughout the length. Calculate its area, then multiply by length. Always include units (cm³, m³). For capacity questions, remember 1 cm³ = 1 ml, 1000 cm³ = 1 litre. Edexcel awards marks for correct formula use and substitution. Show the area of cross-section calculation separately.</p>' },
                'surface-area': { objectives: '<li>Calculate the surface area of cuboids by finding the area of each face</li><li>Calculate the surface area of cylinders: 2πr² + 2πrh</li><li>Find the surface area of other right prisms</li><li>Solve problems involving surface area in context (e.g. wrapping, painting)</li>', concepts: '<p>Surface area is the total area of all faces of a 3D solid. For a cuboid with dimensions l × w × h: surface area = 2lw + 2lh + 2wh (three pairs of identical faces). For a cylinder: surface area = 2πr² (two circular ends) + 2πrh (curved surface = circumference × height). For other prisms, find the area of each face separately and add. Edexcel contexts include: amount of paint needed, wrapping paper, and material for boxes. This is a Grade 5 topic that often challenges Foundation students.</p>', mistakes: '<li>Forgetting to include all faces — a cuboid has 6 faces, a cylinder has 3 surfaces (2 circles + 1 rectangle)</li><li>Confusing surface area with volume</li><li>Missing the formula for the curved surface of a cylinder (circumference × height)</li><li>Not doubling the area of the two identical faces on a cuboid</li>', guidance: '<p>Sketch a net of the solid to help visualise all faces. Calculate each face area separately and write them down before adding. For cylinders, remember the curved surface is a rectangle when unrolled, with width = circumference. Edexcel expects clear working — list each face area. State the total surface area with correct square units.</p>' },
                'transformations': { objectives: '<li>Perform and describe translations using column vectors</li><li>Perform and describe reflections in a given mirror line</li><li>Perform and describe rotations about a point by a given angle and direction</li><li>Perform and describe enlargements by a scale factor from a centre of enlargement</li>', concepts: '<p>Transformations change the position or size of a shape. Edexcel tests four types: translation (sliding — described by a column vector), reflection (flipping over a mirror line — describe by stating the line equation), rotation (turning — describe by centre, angle, direction), and enlargement (scaling — describe by centre and scale factor). You must be able to both perform transformations and fully describe them. For description, all required details must be stated — Edexcel is strict about this.</p>', mistakes: '<li>Incomplete descriptions: rotation needs centre, angle AND direction; enlargement needs centre AND scale factor</li><li>Reflecting in the wrong line — check whether it is x = 0 (y-axis), y = 0 (x-axis), or a diagonal like y = x</li><li>Using the wrong direction for rotation (clockwise vs anticlockwise)</li><li>Plotting the image of a vertex incorrectly by miscounting squares</li>', guidance: '<p>For descriptions: translation needs a column vector; reflection needs the mirror line equation; rotation needs centre, angle, and direction; enlargement needs centre and scale factor. When performing, work one vertex at a time and double-check each. Use tracing paper for rotations (allowed in Edexcel exams). Label the image clearly.</p>' },
                'scatter-graphs': { objectives: '<li>Plot scatter graphs using given bivariate data</li><li>Describe the relationship between variables (positive/negative correlation, strong/weak)</li><li>Draw a line of best fit and use it to estimate values</li><li>Identify outliers and understand that correlation does not imply causation</li>', concepts: '<p>Scatter graphs show the relationship between two variables. Edexcel expects you to plot points accurately, describe correlation (positive, negative, or none; strong, moderate, or weak), draw a line of best fit (straight line through the general trend — roughly equal points above and below), and use it to estimate values (interpolation within the data range is reliable; extrapolation beyond is unreliable). Correlation does not mean causation — just because two things are correlated does not mean one causes the other.</p>', mistakes: '<li>Drawing a line of best fit that passes through the origin when it should not (do not force it)</li><li>Connecting the dots point-to-point instead of drawing a single straight line through the trend</li><li>Describing correlation as strong when points are widely scattered</li><li>Extrapolating beyond the data range and treating the estimate as reliable</li>', guidance: '<p>Plot points as small crosses (×). The line of best fit should be a single straight line with roughly equal points above and below. Edexcel expects you to use a ruler. When estimating, draw lines on the graph to show how you read the value. Use the terms positive correlation, negative correlation, or no correlation, and add strong or weak to qualify. Comment on outliers if present.</p>' },
                'probability-basic': { objectives: '<li>Calculate probabilities using the formula: number of desired outcomes ÷ total outcomes</li><li>Express probabilities as fractions, decimals or percentages</li><li>Understand that probabilities always lie between 0 (impossible) and 1 (certain)</li><li>Use the fact that the probabilities of all possible outcomes sum to 1</li>', concepts: '<p>Probability measures how likely an event is. Edexcel Foundation tests: finding probability from given information, understanding the probability scale (0 = impossible, 1 = certain, 0.5 = even chance), and knowing that P(event not happening) = 1 - P(event happening). Probabilities can be written as fractions, decimals or percentages — fractions in simplest form are preferred. Questions often involve dice, spinners, cards, and coloured counters in bags. The sum of probabilities of all mutually exclusive outcomes = 1.</p>', mistakes: '<li>Writing a probability greater than 1 or less than 0 — always check if your answer makes sense</li><li>Counting outcomes incorrectly, especially with two dice (there are 36 possible outcomes, not 12)</li><li>Not simplifying fractions (Edexcel may specify give your answer in its simplest form)</li><li>Confusing the probability of an event with the probability of it not happening</li>', guidance: '<p>Write the formula: P(event) = number of favourable outcomes / total number of possible outcomes. Check your total is correct — list the sample space if needed. Simplify fractions. When the question says find the probability that... does NOT happen, calculate 1 - P(happens). Edexcel accepts equivalent fractions but simplest form is expected unless stated otherwise.</p>' },
                'frequency-trees': { objectives: '<li>Complete and interpret frequency trees</li><li>Use frequency trees to calculate probabilities</li><li>Understand that frequency trees show counts rather than probabilities</li><li>Apply frequency trees to solve problems involving combined events</li>', concepts: '<p>Frequency trees organise data about two or more combined events, showing how a total splits at each stage. Unlike probability trees (which use probabilities), frequency trees use actual numbers (frequencies). You start with the total, branch according to one attribute, then branch again for the second attribute. Edexcel tests completing partially filled frequency trees and using them to find proportions or probabilities. This topic bridges frequency tables and probability trees at higher grades.</p>', mistakes: '<li>Adding frequencies incorrectly — each split should sum to the total of that branch</li><li>Confusing frequency trees with probability trees — frequency trees use whole numbers, not decimals</li><li>Forgetting to complete all branches before using the tree for probability</li><li>Using the wrong total when calculating probabilities from a completed frequency tree</li>', guidance: '<p>Check that each pair of branches sums to the total at the previous node. Fill in missing values by subtracting from totals. Once the tree is complete, find probabilities by dividing the frequency of the desired outcome by the overall total. Edexcel may ask for what fraction of... — simplify your answer.</p>' },
                'standard-form': { objectives: '<li>Convert numbers between ordinary form and standard form (A × 10ⁿ where 1 ≤ A &lt; 10)</li><li>Add and subtract numbers in standard form by converting to ordinary form or matching powers of 10</li><li>Multiply and divide numbers in standard form using index laws</li><li>Use standard form in context including very large and very small measurements</li>', concepts: '<p>Standard form writes numbers as A × 10ⁿ where 1 ≤ A &lt; 10 and n is an integer. Large numbers have positive n; small decimals (less than 1) have negative n. Edexcel tests converting both ways, and performing calculations in standard form — multiplication: (A × 10ⁿ) × (B × 10ᵐ) = (A × B) × 10ⁿ⁺ᵐ; division: (A × 10ⁿ) ÷ (B × 10ᵐ) = (A ÷ B) × 10ⁿ⁻ᵐ. For addition/subtraction, convert to the same power of 10 first or convert to ordinary numbers. Contexts include astronomy, microbiology, and engineering.</p>', mistakes: '<li>Writing A outside the range 1 ≤ A &lt; 10 (e.g. 56 × 10³ instead of 5.6 × 10⁴)</li><li>Incorrectly determining the sign of n — large numbers have positive n, small decimals have negative n</li><li>Adding/subtracting without matching powers of 10 first</li><li>Losing track of the power of 10 during multiplication/division of the A values</li>', guidance: '<p>Always check that A is between 1 and 10 (1 is allowed, 10 is not). When multiplying, multiply the A values and add the powers. When dividing, divide the A values and subtract the powers. After calculating, adjust if A falls outside the range. Edexcel expects final answers in correct standard form — marks are awarded for correct method even if conversion to standard form at the end has an error.</p>' },
                'compound-interest': { objectives: '<li>Calculate compound interest using the formula: Amount = P(1 + r/100)ⁿ</li><li>Understand the difference between simple and compound interest</li><li>Calculate depreciation using a similar formula with subtraction: Amount = P(1 - r/100)ⁿ</li><li>Solve problems involving repeated percentage change including growth and decay</li>', concepts: '<p>Compound interest is interest calculated on both the original principal and accumulated interest. The Edexcel formula is: A = P(1 + r/100)ⁿ where P = principal, r = rate per period, n = number of periods. For depreciation (loss of value), use A = P(1 - r/100)ⁿ. Edexcel distinguishes between simple interest (same amount each year, not tested with a formula) and compound interest. Context questions include savings accounts, loans, population growth, radioactive decay, and depreciation of cars/equipment.</p>', mistakes: '<li>Using simple interest when the question requires compound interest (or vice versa)</li><li>Forgetting to convert the percentage to a decimal correctly: r/100</li><li>Misusing the formula: adding when it should be subtracting (depreciation) or vice versa</li><li>Not reading whether n is years, months, or another period — and not adjusting r accordingly</li>', guidance: '<p>Write the formula first, then substitute carefully. Show the substitution with brackets. Use the power button (^ or xⁿ) on your calculator. For multi-step problems, you may need to find the total after n years, then subtract the original to find the interest earned. Edexcel awards method marks for correct formula use. Give money answers to 2 decimal places.</p>' },
                'bounds': { objectives: '<li>Calculate the upper and lower bounds of rounded or truncated measurements</li><li>Find the upper and lower bounds of quantities calculated from rounded values</li><li>Express error intervals using inequalities</li><li>Use bounds to determine the maximum and minimum possible values in context</li>', concepts: '<p>Bounds (limits of accuracy) apply when a measurement is given to a certain degree of accuracy. If a length is 12 cm to the nearest cm, the actual length could be anywhere from 11.5 cm to 12.5 cm — the upper bound is 12.5, lower bound is 11.5. For a measurement given to 1 decimal place, bounds are ±0.05. For significant figures, the bounds depend on the place value of the last significant digit. When calculating with bounds (e.g. area, speed), use the appropriate combination: for maximum result, use upper/upper or upper - lower etc.</p>', mistakes: '<li>Forgetting that the upper bound is not included (e.g. 12.5 is the upper bound but not a possible value if 12 was rounded to nearest cm)</li><li>Using the wrong interval for the bounds — to nearest cm = ±0.5 cm; to 1 dp = ±0.05; to 2 sf requires careful thought</li><li>Using the wrong combination of bounds in calculations — to maximise A × B, use upper × upper; to maximise A ÷ B, use upper ÷ lower</li><li>Not expressing the answer as an inequality when the question asks for an error interval</li>', guidance: '<p>Always identify the degree of accuracy first. Write bounds as an inequality: lower bound ≤ actual value &lt; upper bound. For calculations, think logically about which combination gives the maximum and minimum. Show bounds for each value separately, then perform the operation. Edexcel expects the final answer with clear upper and lower bounds stated.</p>' },
                'simultaneous': { objectives: '<li>Solve simultaneous linear equations using the elimination method</li><li>Solve simultaneous linear equations using the substitution method</li><li>Form and solve simultaneous equations from word problems</li><li>Solve simultaneous equations where one equation is linear and the other is quadratic (higher only)</li>', concepts: '<p>Simultaneous equations involve finding values that satisfy two (or more) equations at the same time. Edexcel Higher tier tests two main methods. Elimination: multiply one or both equations so the coefficients of one variable match, then add or subtract to eliminate. Substitution: rearrange one equation to make one variable the subject, then substitute into the other. Context questions include costs of items and geometric problems. At Grade 6, linear/quadratic simultaneous equations also appear.</p>', mistakes: '<li>Adding when you should subtract (or vice versa) — check the signs carefully</li><li>Forgetting to multiply all terms in the equation, including the constant</li><li>Solving for one variable but not substituting back to find the other</li><li>Not checking the solution in both original equations</li>', guidance: '<p>Label the equations (1) and (2). Write the operation between them clearly. After finding one variable, substitute back into the easier equation. Edexcel awards method marks for correct elimination steps even if arithmetic contains errors. Always check by substituting both values into the original equations. State the answer clearly: x = ..., y = ...</p>' },
                'quadratics-factor': { objectives: '<li>Factorise quadratic expressions of the form x² + bx + c</li><li>Factorise quadratics with a coefficient of x² greater than 1 (ax² + bx + c)</li><li>Solve quadratic equations by factorising: set each factor to zero</li><li>Understand the difference of two squares: a² - b² = (a + b)(a - b)</li>', concepts: '<p>Factorising quadratics is a core Higher tier skill. For x² + bx + c, find two numbers that multiply to c and add to b. For ax² + bx + c (a &gt; 1), methods include: trial and error, grouping (splitting the middle term), or the grid method. The difference of two squares is a special case: x² - 25 = (x + 5)(x - 5). After factorising, solving uses the zero-product rule: if (x + p)(x + q) = 0, then x = -p or x = -q. Edexcel tests factorising both standalone and within problem-solving contexts.</p>', mistakes: '<li>Finding numbers that multiply to c but not checking they add to b</li><li>Getting the signs wrong — remember the signs in the factors depend on b and c</li><li>Forgetting that the difference of two squares is a special factorisation: x² - 9 = (x+3)(x-3), not (x-3)²</li><li>Factorising correctly but forgetting to set each factor to zero when solving</li>', guidance: '<p>For x² + bx + c, list factor pairs of c and check the sum. Write the factorised form with brackets. When solving, write either x + p = 0 or x + q = 0, then solve each. Edexcel awards marks for correct factorisation even if solving contains an error. Check by expanding your factors — you should get the original quadratic. For ax² + bx + c, the grouping method is reliable.</p>' },
                'quadratic-formula': { objectives: '<li>Use the quadratic formula: x = [-b ± √(b² - 4ac)] / 2a</li><li>Identify a, b and c from a quadratic equation in the form ax² + bx + c = 0</li><li>Use the discriminant (b² - 4ac) to determine the number of solutions</li><li>Solve problems leading to quadratic equations using the formula</li>', concepts: '<p>The quadratic formula solves any quadratic equation ax² + bx + c = 0. Edexcel provides the formula on the formula sheet, but you must identify a, b and c correctly and substitute carefully. The discriminant (b² - 4ac) tells you how many solutions: if positive = 2 solutions; if zero = 1 repeated solution; if negative = no real solutions. Questions often ask you to give answers to a specific degree of accuracy (usually 3 sf or 2 dp). The formula is essential when factorising is difficult or impossible.</p>', mistakes: '<li>Misidentifying a, b or c — especially the sign (e.g. in 3x² - 2x + 5 = 0, b = -2, not 2)</li><li>Forgetting the ± symbol and only giving one solution</li><li>Calculation errors when squaring b (especially negative b) or multiplying 4ac</li><li>Not putting brackets around -b when substituting into the calculator</li>', guidance: '<p>Write a =, b =, c = clearly before substituting. Use brackets when entering into your calculator: (-b ± √(b² - 4ac)) ÷ (2a). Edexcel gives the formula but you must use it correctly. Give both solutions unless the context excludes one. Round as instructed. If the discriminant is negative, state no real solutions rather than trying to square root a negative.</p>' },
                'completing-square': { objectives: '<li>Complete the square for quadratic expressions of the form x² + bx + c</li><li>Write a quadratic in completed square form: (x + p)² + q</li><li>Use completing the square to find the turning point (vertex) of a quadratic graph</li><li>Solve quadratic equations by completing the square</li>', concepts: '<p>Completing the square rewrites a quadratic x² + bx + c as (x + p)² + q, where p = b/2 and q = c - p². For example, x² + 6x + 5 = (x + 3)² - 4 (since p = 3, 3² = 9, 5 - 9 = -4). This form reveals the turning point of y = x² + bx + c: the vertex is (-p, q), so for (x + 3)² - 4 the minimum point is (-3, -4). Edexcel tests this both for finding turning points and solving equations (set the completed square form = 0, then rearrange and square root).</p>', mistakes: '<li>Halving b incorrectly — especially when b is odd (e.g. x² + 5x gives p = 2.5)</li><li>Forgetting to subtract p² after adding it — the expression must remain equivalent</li><li>Writing the turning point with the wrong signs — if the form is (x + p)² + q, the vertex is (-p, q)</li><li>Not simplifying after completing the square when solving: (x + 3)² = 4 → x + 3 = ±2 → x = -1 or -5</li>', guidance: '<p>Halve the coefficient of x to find p. Square p, then adjust the constant: c becomes c - p². Write the completed square form clearly. For turning point questions, state the coordinates clearly. Edexcel awards marks for correct completed square form even if the turning point is given with the wrong sign. Check by expanding your completed square to verify it matches the original.</p>' },
                'quadratic-graphs': { objectives: '<li>Plot quadratic graphs of the form y = ax² + bx + c using a table of values</li><li>Identify the roots, y-intercept and turning point from a quadratic graph</li><li>Sketch quadratic graphs showing key features</li><li>Use quadratic graphs to solve equations including simultaneous equations with a linear graph</li>', concepts: '<p>Quadratic graphs produce a parabola (U-shaped if a &gt; 0, ∩-shaped if a &lt; 0). Edexcel requires you to complete a table of values, plot points, and draw a smooth curve (not straight line segments). Key features: roots (where y = 0, crosses x-axis), y-intercept (where x = 0), turning point (minimum or maximum). You should be able to use the graph to solve equations — e.g. the solutions to x² + 2x - 3 = 0 are where y = x² + 2x - 3 crosses the x-axis. Simultaneous solutions are where the quadratic and a straight line intersect.</p>', mistakes: '<li>Drawing straight lines between points instead of a smooth curve</li><li>Not plotting enough points — a table with x from -3 to 3 is usually needed to capture the shape</li><li>Misreading the scale when finding roots or intercepts</li><li>Forgetting that the graph can cross the x-axis at 0, 1 or 2 points (depending on the discriminant)</li>', guidance: '<p>Use a smooth continuous curve, not straight line segments. Plot at least 5-7 points. Label the graph with its equation. When solving using the graph, draw guidelines from the intersection to the axes. Edexcel accepts answers within a small tolerance for graph reading. For simultaneous equations, clearly mark the intersection points and state both coordinates.</p>' },
                'functions-basic': { objectives: '<li>Understand function notation: f(x) means a function of x</li><li>Evaluate functions for given inputs: substitute the input value into the expression</li><li>Find the inverse of a linear function</li><li>Understand domain and range in simple contexts</li>', concepts: '<p>Functions map inputs to outputs. Edexcel uses notation f(x) = ... (read as f of x). To evaluate f(3), replace every x with 3. For example, if f(x) = 2x + 1, then f(3) = 7. The inverse function f⁻¹(x) reverses the mapping — find it by writing y = f(x), swapping x and y, then solving for y. Domain is the set of allowed inputs; range is the set of possible outputs. Edexcel tests functions with linear expressions, and at higher grades includes composite functions and functions with restricted domains.</p>', mistakes: '<li>Misreading f(3) as f × 3 — function notation is not multiplication</li><li>Forgetting to replace every occurrence of x, especially in expressions like f(x) = x² + 3x</li><li>Finding the inverse incorrectly — the steps are: write y =, swap x and y, solve for y</li><li>Not stating the inverse using correct notation: f⁻¹(x) = ...</li>', guidance: '<p>When evaluating, use brackets to avoid sign errors. For inverse functions, show the steps: y = f(x), x = f(y), then solve for y. Edexcel awards method marks for correct algebraic manipulation. Always check inverse by testing f(f⁻¹(x)) should equal x. For domain/range, think about what values make sense — e.g. if f(x) = √x, domain is x ≥ 0.</p>' },
                'iteration': { objectives: '<li>Use iterative formulas to find approximate solutions to equations</li><li>Rearrange an equation into the form x = g(x) to create an iterative formula</li><li>Perform iterations using a calculator efficiently</li><li>Understand when an iteration has converged to a solution</li>', concepts: '<p>Iteration finds approximate solutions to equations that cannot be solved algebraically. Edexcel provides an iterative formula like xₙ₊₁ = √(2xₙ + 5) and a starting value x₀. You repeatedly apply the formula using the ANS button on your calculator. The sequence converges when successive values are very close (usually to the required accuracy). To derive an iterative formula, rearrange the equation into the form x = g(x). For example, x² - 3x - 2 = 0 → x² = 3x + 2 → x = √(3x + 2).</p>', mistakes: '<li>Not using the ANS button correctly — press = repeatedly to iterate</li><li>Stopping too early before the values have converged to the required accuracy</li><li>Choosing a starting value that does not converge (the sequence may diverge or oscillate)</li><li>Deriving an iterative formula that does not converge to the desired root</li>', guidance: '<p>Write the iterative formula clearly. Use the ANS button: type the starting value, press =, then type the formula using ANS for xₙ, and press = repeatedly. Record each iteration to the required accuracy. Stop when two consecutive values are the same to the required degree of accuracy. Edexcel usually asks for answers to 2 or 3 decimal places. State the final approximate solution clearly.</p>' },
                'similar-shapes': { objectives: '<li>Understand that similar shapes have equal corresponding angles and proportional corresponding sides</li><li>Calculate missing lengths in similar shapes using scale factors</li><li>Use the relationship between length, area and volume scale factors: ASF = LSF², VSF = LSF³</li><li>Solve problems involving similar triangles and 3D solids</li>', concepts: '<p>Similar shapes are identical in shape but different in size. If the length scale factor is k, then area scale factor = k² and volume scale factor = k³. Edexcel tests finding missing lengths using ratio, and more complex problems where you are given areas or volumes and must find the length scale factor first (by square rooting or cube rooting the given ratio). Similar triangles often appear with parallel lines creating proportional sides. In 3D, similar cylinders, cones and spheres are common.</p>', mistakes: '<li>Confusing length, area and volume scale factors — if length SF = 2, area SF = 4, volume SF = 8</li><li>Applying the area or volume scale factor as a length scale factor</li><li>Forgetting to square or cube root when working backwards from area/volume to length</li><li>Assuming two shapes are similar without checking that all corresponding angles are equal or sides are proportional</li>', guidance: '<p>Find the length scale factor first by dividing a pair of corresponding sides. Label it clearly. For area problems, square it. For volume problems, cube it. When given areas, find LSF by square rooting the area ratio. When given volumes, find LSF by cube rooting the volume ratio. Edexcel awards marks for correct scale factor identification even if application contains errors. Always check corresponding sides are in the same order.</p>' },
                'trigonometry': { objectives: '<li>Use SOHCAHTOA to find missing sides and angles in right-angled triangles</li><li>Apply trigonometry to solve problems involving angles of elevation and depression</li><li>Use trigonometry in 3D contexts and bearings</li><li>Know when to use trigonometry vs Pythagoras</li>', concepts: '<p>Trigonometry relates angles and sides in right-angled triangles. Edexcel requires you to know: sin θ = opposite/hypotenuse, cos θ = adjacent/hypotenuse, tan θ = opposite/adjacent. To find a side: choose the ratio with the known angle and side, substitute, and solve. To find an angle: identify two known sides, choose the ratio linking them, use the inverse function (sin⁻¹, cos⁻¹, tan⁻¹). Context problems include angles of elevation (looking up) and depression (looking down), 3D diagonals, and bearings. Pythagoras is used when you have two sides and need the third, without angles.</p>', mistakes: '<li>Labelling the wrong side as opposite or adjacent — opposite is opposite the angle, adjacent is next to the angle (not the hypotenuse)</li><li>Using the wrong ratio — check which sides you have or need</li><li>Forgetting to use the inverse trig function when finding an angle</li><li>Using Pythagoras when you should use trigonometry (or vice versa)</li>', guidance: '<p>Label sides O, A, H relative to the angle you are using. Write SOHCAHTOA. For finding sides: write the equation, then multiply or divide to isolate the unknown. For finding angles: use the inverse function (shift sin/cos/tan). Edexcel expects answers to 3 significant figures or 1 decimal place for angles unless specified. Show the substitution step — method marks are available.</p>' },
                'exact-trig': { objectives: '<li>Know exact values of sin, cos and tan for 0°, 30°, 45°, 60° and 90°</li><li>Use exact trig values in calculations without a calculator</li><li>Simplify expressions involving exact trig values</li><li>Apply exact trig values in geometric problems</li>', concepts: '<p>Edexcel Higher requires you to memorise exact trig values. Key values: sin 30° = 1/2, sin 45° = 1/√2, sin 60° = √3/2; cos 30° = √3/2, cos 45° = 1/√2, cos 60° = 1/2; tan 30° = 1/√3, tan 45° = 1, tan 60° = √3. Also know sin 0° = 0, cos 0° = 1, tan 0° = 0; sin 90° = 1, cos 90° = 0. These values are derived from two special triangles: 45-45-90 (sides 1:1:√2) and 30-60-90 (sides 1:√3:2). Questions appear on non-calculator papers and often combine exact trig with surds or Pythagoras.</p>', mistakes: '<li>Confusing sin and cos values for 30° and 60° — they are swapped (sin 30° = cos 60° = 1/2)</li><li>Writing tan 45° as √2 or something other than 1</li><li>Forgetting to rationalise the denominator when the answer involves 1/√2 or 1/√3</li><li>Mixing up the triangles — the 45-45-90 triangle has sides in ratio 1:1:√2, the 30-60-90 has sides 1:√3:2</li>', guidance: '<p>Draw the two special triangles to derive the values rather than relying on pure memorisation. For 45° triangle: two legs = 1, hypotenuse = √2. For 30-60-90 triangle: shortest leg (opposite 30°) = 1, hypotenuse = 2, other leg = √3. Edexcel non-calculator questions expect answers in exact simplified form — leave as fractions or surds, not rounded decimals. Rationalise denominators.</p>' },
                'sectors-arcs': { objectives: '<li>Calculate the length of an arc: (θ/360) × 2πr</li><li>Calculate the area of a sector: (θ/360) × πr²</li><li>Find the angle or radius given the arc length or sector area</li><li>Solve problems involving sectors, arcs and segments in context</li>', concepts: '<p>A sector is a slice of a circle, bounded by two radii and an arc. The arc length is a fraction of the circumference: (θ/360) × 2πr. The sector area is the same fraction of the circle area: (θ/360) × πr². Edexcel questions may give the arc length or sector area and ask you to find the angle or radius — rearrange the formula. The perimeter of a sector = arc length + 2r (do not forget the two radii). Context problems include clock faces, pie charts, and circular irrigation systems.</p>', mistakes: '<li>Forgetting to add the two radii when finding the perimeter of a sector</li><li>Using the diameter instead of the radius in formulas</li><li>Not converting the angle to the correct fraction — θ/360 for degrees (most Edexcel questions use degrees)</li><li>Confusing arc length formula with sector area formula</li>', guidance: '<p>Write the formula first: fraction = θ/360. Then multiply by circumference (for arc) or area (for sector). For reverse problems, set up the equation and solve for θ or r. The perimeter of a sector includes the two straight sides. Give answers to 3 sf unless specified. Edexcel awards method marks for correct fraction and formula use.</p>' },
                'pythagoras-3d': { objectives: '<li>Apply Pythagoras theorem in 3D shapes to find the length of a space diagonal</li><li>Use a² + b² + c² = d² for cuboid diagonals</li><li>Find lengths in pyramids, cones and other 3D solids</li><li>Solve problems combining Pythagoras with trigonometry in 3D</li>', concepts: '<p>3D Pythagoras extends the theorem to three dimensions. For a cuboid with sides a, b, c, the space diagonal d = √(a² + b² + c²). To find other lengths in 3D (e.g. the slant height of a pyramid), break the problem into two 2D right-angled triangles: first find a diagonal on the base, then use that diagonal with the vertical height. Edexcel questions often involve finding the length of the longest rod that fits in a box, or the distance between opposite corners of a room. These frequently appear on Higher non-calculator papers.</p>', mistakes: '<li>Using the 3D formula a² + b² = c² instead of a² + b² + c² = d² for cuboid diagonals</li><li>Applying the 3D formula to non-cuboid shapes — for pyramids, break into 2D triangles</li><li>Not identifying which face or cross-section contains the required right-angled triangle</li><li>Forgetting to take the square root at the end</li>', guidance: '<p>Sketch the 3D shape and highlight the right-angled triangle you are using. For cuboids, the space diagonal formula works directly. For other shapes, work step by step: find one length using Pythagoras, then use that in a second Pythagoras calculation. Leave answers in surd form on non-calculator papers unless instructed otherwise. Edexcel awards method marks for identifying the correct triangle.</p>' },
                'histograms': { objectives: '<li>Understand that in a histogram, area represents frequency (not height)</li><li>Calculate frequency density: frequency ÷ class width</li><li>Draw histograms with unequal class intervals using frequency density on the vertical axis</li><li>Interpret histograms to find frequencies, medians and proportions</li>', concepts: '<p>Histograms display grouped continuous data where the area of each bar is proportional to frequency. When class widths are unequal, frequency density (fd = frequency ÷ class width) is plotted on the vertical axis. Edexcel Higher tests drawing histograms from frequency tables, completing tables from histograms, and estimating statistics from histograms using cumulative frequency. Histograms are distinct from bar charts — in bar charts, height = frequency and bars can have gaps; in histograms, area = frequency and bars touch.</p>', mistakes: '<li>Plotting frequency instead of frequency density on the vertical axis — this is only correct when all class widths are equal</li><li>Forgetting to calculate frequency density as frequency ÷ class width</li><li>Drawing bars with gaps between them — histograms have no gaps for continuous data</li><li>Finding the median by simply halving the total frequency without creating a cumulative frequency column</li>', guidance: '<p>Always calculate frequency density for each class. Write fd = freq/width next to each bar. Check that the total area of all bars is proportional to the total frequency. To estimate the median from a histogram, construct a cumulative frequency table or work proportionally through the bars. Edexcel awards marks for correct frequency density calculations and correctly scaled axes.</p>' },
                'cumulative-freq': { objectives: '<li>Construct cumulative frequency tables and graphs from grouped frequency data</li><li>Plot cumulative frequency curves (ogives) with cumulative frequency on the vertical axis</li><li>Estimate the median, quartiles and interquartile range from a cumulative frequency graph</li><li>Use cumulative frequency graphs to compare data sets</li>', concepts: '<p>Cumulative frequency is the running total of frequencies. Edexcel requires you to: add a cumulative frequency column to a grouped frequency table, plot points at the upper class boundary (not midpoint), and draw a smooth curve through the points. The median = value at ½ total frequency; lower quartile (Q1) = value at ¼ total frequency; upper quartile (Q3) = value at ¾ total frequency; interquartile range (IQR) = Q3 - Q1. These graphs are used to compare distributions and identify skew.</p>', mistakes: '<li>Plotting cumulative frequency at the midpoint of the class instead of the upper boundary</li><li>Drawing straight lines between points instead of a smooth curve</li><li>Forgetting to add the frequencies correctly — check each cumulative total</li><li>Miscalculating the quartile positions: Q1 at n/4, Q2 at n/2, Q3 at 3n/4 (where n is total frequency)</li>', guidance: '<p>Always plot at upper class boundaries. Draw a smooth curve. Draw horizontal lines from the quartile positions on the y-axis to the curve, then drop vertical lines to read the values. Edexcel accepts a small tolerance for graph reading. State the median and IQR clearly. In comparison questions, refer to both the median (central tendency) and the IQR (spread).</p>' },
                'box-plots': { objectives: '<li>Construct box plots (box and whisker diagrams) from five-number summaries</li><li>Find the median, quartiles and interquartile range from box plots</li><li>Compare data sets using box plots</li><li>Identify outliers and understand the shape of distributions from box plots</li>', concepts: '<p>A box plot displays the five-number summary: minimum, lower quartile (Q1), median (Q2), upper quartile (Q3), maximum. The box spans Q1 to Q3 with a line at the median; whiskers extend to the minimum and maximum. Edexcel tests drawing box plots on a scale, interpreting them, and comparing two data sets. The width of the box (IQR) shows spread; the position of the median line within the box indicates skew. Box plots often follow cumulative frequency questions.</p>', mistakes: '<li>Confusing the positions of median and quartiles on the scale</li><li>Drawing the box with the median line in the centre when the data is skewed</li><li>Using the wrong scale or not labelling the axis</li><li>Stating the IQR as the total range (max - min) instead of Q3 - Q1</li>', guidance: '<p>Draw the scale first, then mark the five values carefully. The box should be clearly drawn with a line for the median. Edexcel expects accurate positioning. When comparing box plots, comment on: median (which is higher/lower on average), IQR (which is more spread out), and range. Use specific values from the graphs to support your statements. Always label the axis.</p>' },
                'tree-diagrams': { objectives: '<li>Construct and use probability tree diagrams for independent events</li><li>Use probability trees for dependent events (conditional probability)</li><li>Multiply along branches and add across branches (AND = ×, OR = +)</li><li>Check that probabilities on all branches from a point sum to 1</li>', concepts: '<p>Tree diagrams show the outcomes of two or more combined events. Each branch shows a probability; probabilities from a single point sum to 1. For independent events (with replacement), probabilities on the second set of branches are the same as the first. For dependent events (without replacement), the second probabilities change based on the first outcome. Edexcel tests both types. To find the probability of a specific combination, multiply along the branches. To find the probability of at least one or either outcome, add the probabilities of the relevant end branches.</p>', mistakes: '<li>Forgetting that probabilities on branches from one point must sum to 1</li><li>Using independent probabilities when the events are dependent (without replacement)</li><li>Adding probabilities when you should multiply (or vice versa)</li><li>Not reading carefully whether the question is with replacement or without replacement</li>', guidance: '<p>Draw the tree clearly with two (or three) stages. Label each branch with the probability (fraction or decimal). Write the outcome at the end of each path. Multiply along branches, then add the relevant end probabilities. For conditional probability, use the formula P(A|B) = P(A and B) / P(B). Edexcel often asks for probabilities as fractions in simplest form. Check that all end probabilities sum to 1.</p>' },
                'surds': { objectives: '<li>Simplify surds by identifying and extracting square factors</li><li>Add, subtract, multiply and divide expressions involving surds</li><li>Rationalise denominators of the form √a and a + √b</li><li>Apply surd manipulation in exact calculations and geometric contexts</li>', concepts: '<p>Surds are irrational numbers expressed using the √ symbol. Edexcel Higher tests simplifying surds by extracting the largest square factor (e.g. √48 = √(16×3) = 4√3). Addition/subtraction only works with like surds (same number under the root). Multiplication: √a × √b = √(ab). Division: √a/√b = √(a/b). Rationalising the denominator removes the surd from the bottom of a fraction — for a single surd, multiply top and bottom by the surd; for expressions like a + √b, multiply by the conjugate a - √b. Surds appear in exact trig, Pythagoras, and area problems.</p>', mistakes: '<li>Trying to add unlike surds (e.g. √3 + √5 cannot be simplified to √8)</li><li>Forgetting that √(a+b) is NOT equal to √a + √b</li><li>Only multiplying the denominator by the conjugate and forgetting to multiply the numerator</li><li>Not fully simplifying surds by missing square factors (e.g. √72 = √(36×2) = 6√2, not √(9×8) = 3√8)</li>', guidance: '<p>Always look for the largest square factor when simplifying. For addition/subtraction, simplify each surd first — like terms may emerge. When rationalising, multiply numerator and denominator by the same expression. Edexcel expects answers in simplest surd form on non-calculator papers. Leave answers as exact surds unless the question specifies decimal approximation.</p>' },
                'exponential': { objectives: '<li>Understand and use exponential growth and decay functions: y = a × bˣ</li><li>Solve problems involving compound interest, population growth and radioactive decay</li><li>Interpret exponential graphs and their key features</li><li>Recognise the difference between linear and exponential growth</li>', concepts: '<p>Exponential growth/decay occurs when a quantity increases/decreases by a constant multiplier each time period. The general form is y = a × bˣ, where a is the initial value, b is the growth factor (b &gt; 1 for growth, 0 &lt; b &lt; 1 for decay). Edexcel tests this in context: compound interest, bacteria growth, half-life of radioactive substances, depreciation of assets. Exponential graphs are steep curves — they start shallow and become increasingly steep (growth) or drop rapidly then level off (decay). They never cross the x-axis. This topic extends compound interest and is often linked to iterative processes.</p>', mistakes: '<li>Confusing exponential growth with linear growth — doubling each period is exponential; adding the same amount is linear</li><li>Using the wrong value for b — for a 20% increase, b = 1.2 (not 0.2 or 20)</li><li>Misinterpreting the exponent x — it represents the number of time periods, not the total time in other units</li><li>Forgetting that the initial value a is when x = 0, not x = 1</li>', guidance: '<p>Identify the multiplier b first — increase of r% means b = 1 + r/100; decrease means b = 1 - r/100. Write the equation y = a × bˣ clearly. For graph questions, recognise the shape: exponential growth curves upward increasingly steeply; exponential decay curves downward toward (but never reaching) zero. Edexcel may ask you to compare exponential growth with linear growth in context. Use your calculator efficiently for repeated multiplication.</p>' },
                'algebraic-fractions': { objectives: '<li>Simplify algebraic fractions by factorising and cancelling common factors</li><li>Add and subtract algebraic fractions by finding a common denominator</li><li>Multiply and divide algebraic fractions</li><li>Solve equations involving algebraic fractions</li>', concepts: '<p>Algebraic fractions apply the same rules as numerical fractions but with algebraic expressions. To simplify, factorise the numerator and denominator, then cancel common factors (remember: you can only cancel factors, not terms). To add/subtract, find a common denominator (often the product of the denominators or their LCM), then combine numerators. To multiply, multiply numerators and denominators, then simplify. To divide, flip the second fraction and multiply. Edexcel Higher tests these skills at Grade 8-9, often linked to solving equations where fractions must be cleared first.</p>', mistakes: '<li>Cancelling terms instead of factors — you can only cancel when the expression is fully factorised (e.g. (x+2)/(x+3) cannot be simplified to 2/3)</li><li>Forgetting to factorise before attempting to simplify — many algebraic fractions simplify dramatically after factorisation</li><li>Using the wrong common denominator — multiply denominators together if you cannot find the LCM</li><li>Not checking for restrictions on x — values that make a denominator zero must be excluded</li>', guidance: '<p>Always factorise first. Look for difference of two squares, common factors, and quadratic expressions that factorise. When adding/subtracting, find the common denominator before combining numerators. Simplify the final answer. Edexcel often awards marks for correct factorisation even if later steps contain errors. When solving, multiply through by the common denominator to clear fractions, then solve the resulting equation.</p>' },
                'proof': { objectives: '<li>Construct algebraic proofs using logical reasoning and algebraic manipulation</li><li>Prove statements about odd/even numbers, consecutive integers, and divisibility</li><li>Disprove statements by finding a counter-example</li><li>Present proofs in a clear, step-by-step format with justification</li>', concepts: '<p>Algebraic proof uses algebra to show that a mathematical statement is always true. Edexcel Grade 9 questions typically ask you to prove something about numbers — e.g. prove that the sum of three consecutive integers is always a multiple of 3. The approach: define variables (let n be an integer), write expressions (n, n+1, n+2), simplify (sum = 3n+3 = 3(n+1)), and conclude (3(n+1) is always a multiple of 3). To disprove a statement, find one counter-example. Proof questions test mathematical communication as much as algebra.</p>', mistakes: '<li>Not defining the variable clearly — always state let n be an integer or similar</li><li>Using specific numbers instead of algebraic generalisation — a proof must cover all cases</li><li>Stopping before the conclusion — you must state what the simplified expression shows</li><li>Confusing prove with find a few examples that work — examples do not constitute proof</li>', guidance: '<p>Structure your proof: (1) Define variables, (2) Write the algebraic expression, (3) Simplify, (4) Factorise if needed, (5) Write a concluding sentence explaining what you have shown. Edexcel expects a full chain of reasoning. Use brackets to avoid sign errors. Proof questions are often on non-calculator papers and test deep understanding. For disproof, one clear counter-example with working is sufficient.</p>' },
                'functions-advanced': { objectives: '<li>Understand and use composite functions: fg(x) = f(g(x))</li><li>Find the inverse of more complex functions including quadratics</li><li>Work with functions that have restricted domains</li><li>Solve equations involving functions and their inverses</li>', concepts: '<p>Composite functions apply one function to the output of another. fg(x) means apply g first, then f — order matters as fg(x) ≠ gf(x) generally. To find fg(x), replace every x in f(x) with the expression for g(x). Inverse functions f⁻¹(x) undo the function — find them by writing y = f(x), swapping x and y, solving for y. For quadratics, the domain must be restricted for the inverse to exist. Edexcel Grade 8-9 questions often combine composite and inverse functions, test domain/range understanding, or ask you to solve f(x) = f⁻¹(x).</p>', mistakes: '<li>Applying functions in the wrong order — fg(x) means g first, then f</li><li>Writing fg(x) as f(x) × g(x) — this is composition, not multiplication</li><li>Forgetting to restrict the domain when finding inverses of quadratics — a full parabola does not have an inverse</li><li>Not checking that f(f⁻¹(x)) = x to verify the inverse</li>', guidance: '<p>For composite functions, work from the inside out — evaluate the inner function first. For inverses, write y = f(x), swap variables, and carefully solve for y using inverse operations. With quadratics, complete the square to help find the inverse and identify domain restrictions. Edexcel expects answers in the form f⁻¹(x) = ... with any domain restrictions stated. Check your work by testing a value: calculate f(2), then f⁻¹ of that result should equal 2.</p>' },
                'quadratic-inequalities': { objectives: '<li>Solve quadratic inequalities by sketching the graph and identifying where it is above/below the x-axis</li><li>Express solutions as inequalities or using set notation</li><li>Solve inequalities involving rational expressions</li><li>Apply quadratic inequalities in context</li>', concepts: '<p>Quadratic inequalities ask for what values of x is ax² + bx + c &gt; 0 (or &lt; 0). The method: solve the related quadratic equation to find the roots (where the graph crosses the x-axis), sketch the parabola (U-shaped if a &gt; 0, ∩-shaped if a &lt; 0), then read the solution from the sketch. For example, x² - 5x + 6 &lt; 0 has roots at x = 2 and x = 3, the parabola is U-shaped, so the solution is 2 &lt; x &lt; 3 (the region below the x-axis). For ≥ or ≤, include the endpoints. Edexcel may also test inequalities with algebraic fractions.</p>', mistakes: '<li>Writing the solution as two separate inequalities joined by and or or incorrectly — check whether the region is between the roots or outside them</li><li>Forgetting to consider the shape of the parabola (positive or negative coefficient of x²)</li><li>Using the wrong inequality symbols — check whether the question is &gt;, &lt;, ≥ or ≤</li><li>Not including or excluding the endpoints correctly when the inequality is ≥ or ≤ vs &gt; or &lt;</li>', guidance: '<p>Always solve the equation first to find critical values. Sketch the graph — even a rough sketch helps. For a &gt; 0 (positive x²): graph is below the x-axis between the roots; above the x-axis outside the roots. For a &lt; 0 (negative x²): the reverse. Write the solution as an inequality or interval. Edexcel accepts either form. For rational inequalities, find where the numerator and denominator equal zero, then test intervals.</p>' },
                'circle-theorems': { objectives: '<li>Know and apply all eight standard circle theorems</li><li>Use circle theorems to find missing angles in diagrams</li><li>Give precise geometrical reasons for each step</li><li>Combine multiple circle theorems in multi-step problems</li>', concepts: '<p>Circle theorems describe angle relationships within circles. Edexcel requires knowledge of: (1) Angle at centre = 2× angle at circumference; (2) Angles in same segment are equal; (3) Angle in a semicircle = 90°; (4) Opposite angles in a cyclic quadrilateral sum to 180°; (5) Tangent meets radius at 90°; (6) Tangents from same point are equal in length; (7) Alternate segment theorem; (8) Perpendicular from centre to chord bisects the chord. Questions often combine several theorems and require precise reasons. Diagrams are usually not drawn accurately.</p>', mistakes: '<li>Confusing the angle at centre theorem with angles in same segment</li><li>Applying theorems incorrectly because the diagram shows an angle that does not correspond to the conditions</li><li>Giving vague reasons — write angle at centre is twice angle at circumference not just circle theorem</li><li>Missing that a cyclic quadrilateral requires all four vertices on the circumference</li>', guidance: '<p>Learn the exact wording of each theorem for reasons. Mark all known angles on the diagram. Work step by step, giving a reason for each angle found. Edexcel awards marks for correct angles AND correct reasons — both are required. Look for isosceles triangles (two radii form an isosceles triangle). If stuck, look for which theorem could apply to the angles you know. The alternate segment theorem is often the hardest to spot — look for a tangent and a chord.</p>' },
                'sine-cosine-rule': { objectives: '<li>Use the sine rule: a/sinA = b/sinB = c/sinC for finding sides and angles</li><li>Use the cosine rule: a² = b² + c² - 2bc cosA for finding sides and angles</li><li>Decide whether to use the sine rule, cosine rule or SOHCAHTOA based on given information</li><li>Apply the sine and cosine rules in bearings, navigation and 3D problems</li>', concepts: '<p>The sine and cosine rules extend trigonometry to non-right-angled triangles. Sine rule: use when you know two angles and a side (AAS) or two sides and a non-included angle (SSA — beware the ambiguous case). Cosine rule: use when you know two sides and the included angle (SAS) or all three sides (SSS). The formula a² = b² + c² - 2bc cosA finds a side; rearranged: cosA = (b² + c² - a²)/2bc finds an angle. Edexcel also tests the area formula: ½ab sinC. These rules are essential for bearings, navigation, and 3D geometry at Higher tier.</p>', mistakes: '<li>Using the sine rule when you need the cosine rule (or vice versa) — check what information you have</li><li>Misidentifying which side is opposite which angle — label carefully</li><li>Forgetting to use the inverse cosine function when finding an angle with the cosine rule</li><li>Rounding intermediate values, leading to inaccurate final answers — use full calculator accuracy at each step</li>', guidance: '<p>Label the triangle clearly: capital letters for angles, lowercase for opposite sides. Write the rule you are using. For sine rule, check if the ambiguous case applies (only with SSA where the angle is not the included angle). For cosine rule, substitute carefully with brackets. Use the formula sheet — both rules are provided. Give answers to 3 sf unless specified. For bearings, draw a clear diagram with north lines.</p>' },
                'area-non-right': { objectives: '<li>Calculate the area of any triangle using: Area = ½ab sinC</li><li>Find the area when given two sides and the included angle</li><li>Find missing sides or angles given the area and other dimensions</li><li>Apply the formula in context including segments and compound shapes</li>', concepts: '<p>When a triangle is not right-angled, use Area = ½ab sinC, where a and b are two sides and C is the included angle. This formula is on the Edexcel formula sheet. To find a missing side or angle when given the area, substitute the known values and solve. The formula works because the perpendicular height of a triangle can be expressed as b sinC. This topic often appears alongside the sine and cosine rules in multi-step problems, and with sectors/segments when finding the area of a segment = sector area - triangle area.</p>', mistakes: '<li>Using the wrong angle — it must be the angle between the two sides being used</li><li>Forgetting to multiply by ½</li><li>Confusing this formula with the sine rule — they are different formulas for different purposes</li><li>Using the formula when the triangle is right-angled (which works, but ½ × base × height may be simpler)</li>', guidance: '<p>Write the formula: Area = ½ab sinC. Identify which two sides you know and the angle between them. Substitute carefully. If finding a missing value, rearrange the formula before substituting. When working with segments, find the sector area first, then subtract the triangle area (using ½r² sinθ where r is the radius and θ is the sector angle). Give exact answers using surds where possible, or to 3 sf.</p>' },
                'vectors': { objectives: '<li>Understand vector notation including column vectors and i, j notation</li><li>Add and subtract vectors, and multiply vectors by a scalar</li><li>Find the magnitude of a vector using Pythagoras</li><li>Solve geometric problems using vectors, including parallel and collinear points</li>', concepts: '<p>Vectors represent quantities with both magnitude and direction. Edexcel tests column vectors (e.g. (3, 4)), i and j notation (3i + 4j), and vector geometry with shapes. Key operations: addition (add corresponding components), scalar multiplication (multiply each component), magnitude (|v| = √(x² + y²)). In geometry, vectors are used to describe journeys around shapes — e.g. if A to B is vector a, and B to C is vector b, then A to C = a + b. Parallel vectors are scalar multiples of each other. Collinear points lie on the same straight line (the vectors between them are parallel).</p>', mistakes: '<li>Adding vectors by adding all components together incorrectly (keep i and j separate)</li><li>Confusing vector magnitude with direction — magnitude is always positive</li><li>Assuming that if vectors are equal in magnitude, they are parallel (they must be scalar multiples)</li><li>Not writing vectors with the correct notation — column vectors use brackets, not parentheses</li>', guidance: '<p>Write vectors clearly as column vectors or in i, j form — Edexcel accepts either. For geometry problems, express the required vector as a combination of known vectors. Show your steps clearly. To prove points are collinear, show that the vectors between them are scalar multiples. For parallel vectors, state vector AB = k × vector CD, therefore AB is parallel to CD. Give magnitudes as exact values (surds) or to 3 sf.</p>' },
                'loci': { objectives: '<li>Construct the locus of points that satisfy a given condition (e.g. equidistant from two points)</li><li>Use compass and straightedge constructions: perpendicular bisector, angle bisector</li><li>Solve problems involving loci in context, including regions defined by inequalities</li><li>Combine loci with bearings and scale drawings</li>', concepts: '<p>A locus is a set of points that satisfy a condition. Edexcel tests: locus equidistant from two points (perpendicular bisector), locus equidistant from two lines (angle bisector), locus at a fixed distance from a point (circle), and locus at a fixed distance from a line (parallel lines). Constructions must be done accurately with compass and straightedge — Edexcel requires visible construction arcs. Context problems include find the region closer to A than B or find points within 5 km of a transmitter. These are often combined with scale drawings and bearings.</p>', mistakes: '<li>Not leaving construction arcs visible — Edexcel requires evidence of the compass method</li><li>Confusing perpendicular bisector with angle bisector — the perpendicular bisector uses the endpoints of a line segment</li><li>Missing that the locus equidistant from two intersecting lines is a pair of angle bisectors (at 90° to each other)</li><li>Shading the wrong region — use a test point to check which side satisfies the condition</li>', guidance: '<p>Always use a sharp pencil and compass. Leave all construction arcs clearly visible. Label the locus. For region questions, shade the required area clearly. Edexcel awards marks for correct method, not just the final shaded region. In scale drawing questions, measure accurately — answers within 2 mm tolerance are accepted. State any assumptions clearly.</p>' },
                'direct-proportion': { objectives: '<li>Understand that y is directly proportional to x if y = kx for some constant k</li><li>Understand that y is inversely proportional to x if y = k/x</li><li>Find the constant of proportionality from given values</li><li>Solve problems involving direct and inverse proportion in context</li>', concepts: '<p>Direct proportion: y = kx, where k is the constant of proportionality. Graphically, this is a straight line through the origin. Inverse proportion: y = k/x, producing a hyperbola (y decreases as x increases). Edexcel tests finding k from given pairs of values, then using the equation to find other values. Also tested: proportionality to squares (y ∝ x² → y = kx²) and inverse squares (y ∝ 1/x² → y = k/x²). Context questions include: cost proportional to weight, time inversely proportional to speed, and scientific laws.</p>', mistakes: '<li>Writing y = kx for inverse proportion — inverse proportion is y = k/x, not y = kx</li><li>Forgetting to find k first before using the formula</li><li>Confusing y ∝ x² with y = x² — the constant k is needed: y = kx²</li><li>Not reading carefully whether the relationship is direct or inverse — proportional to means direct; inversely proportional to means inverse</li>', guidance: '<p>Write the proportionality statement: y ∝ x means y = kx. Find k by substituting known values. Then use the equation to find unknowns. For inverse proportion, y = k/x, so xy = k — this constant product is a useful check. Edexcel expects clear working: state the equation, find k, then substitute. For square/cube proportionality, ensure the power is applied correctly. Give final answers to 3 sf unless exact.</p>' },
