<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edexcel GCSE Mathematics | Revision Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --surface-hover: #f5f5f5;
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --text: #171717;
            --text-secondary: #525252;
            --text-tertiary: #737373;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --grade-easy: #16a34a;
            --grade-easy-bg: #f0fdf4;
            --grade-medium: #ca8a04;
            --grade-medium-bg: #fefce8;
            --grade-hard: #ea580c;
            --grade-hard-bg: #fff7ed;
            --grade-advanced: #dc2626;
            --grade-advanced-bg: #fef2f2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #171717;
            --surface-hover: #1f1f1f;
            --border: #262626;
            --border-light: #1f1f1f;
            --text: #f5f5f5;
            --text-secondary: #a3a3a3;
            --text-tertiary: #737373;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #1e293b;
            --grade-easy: #22c55e;
            --grade-easy-bg: #052e16;
            --grade-medium: #eab308;
            --grade-medium-bg: #422006;
            --grade-hard: #f97316;
            --grade-hard-bg: #431407;
            --grade-advanced: #ef4444;
            --grade-advanced-bg: #450a0a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background: var(--bg); color: var(--text); line-height:1.6;
            transition: background var(--transition), color var(--transition);
            min-height:100vh; -webkit-font-smoothing:antialiased;
        }
        .header {
            background: var(--surface); border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:100;
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
        }
        .header-container {
            max-width:1280px; margin:0 auto; padding:0 24px;
            display:flex; align-items:center; justify-content:space-between;
            height:60px; gap:16px;
        }
        .logo {
            display:flex; align-items:center; gap:10px; text-decoration:none;
            color:var(--text); font-weight:700; font-size:1.1rem; letter-spacing:-0.02em; flex-shrink:0;
        }
        .logo-mark {
            width:28px; height:28px; background:var(--primary); border-radius:var(--radius-sm);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800; font-size:0.85rem;
        }
        .search-wrapper { flex:1; max-width:360px; position:relative; }
        .search-input {
            width:100%; padding:8px 14px 8px 36px; border:1px solid var(--border);
            border-radius:24px; background:var(--bg); color:var(--text); font-size:0.875rem;
            font-family:inherit; transition:all var(--transition); outline:none;
        }
        .search-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
        .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); pointer-events:none; }
        .header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        .btn {
            padding:7px 15px; border-radius:20px; border:1px solid var(--border);
            background:var(--surface); color:var(--text-secondary); cursor:pointer;
            font-weight:500; font-size:0.825rem; transition:all var(--transition);
            white-space:nowrap; font-family:inherit; letter-spacing:-0.01em;
        }
        .btn:hover { background:var(--surface-hover); color:var(--text); }
        .btn-icon { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0; }
        .progress-indicator { font-size:0.8rem; color:var(--text-tertiary); font-weight:500; }
        .nav-bar {
            max-width:1280px; margin:0 auto; padding:0 24px;
            display:flex; gap:4px; overflow-x:auto; border-top:1px solid var(--border-light);
        }
        .nav-item {
            padding:10px 16px; border:none; background:transparent; cursor:pointer;
            font-weight:500; font-size:0.825rem; color:var(--text-secondary);
            transition:all var(--transition); white-space:nowrap; font-family:inherit;
            letter-spacing:-0.01em; border-bottom:2px solid transparent; margin-bottom:-1px;
        }
        .nav-item:hover { color:var(--text); }
        .nav-item.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
        .nav-item.grade-easy.active { color:var(--grade-easy); border-bottom-color:var(--grade-easy); }
        .nav-item.grade-medium.active { color:var(--grade-medium); border-bottom-color:var(--grade-medium); }
        .nav-item.grade-hard.active { color:var(--grade-hard); border-bottom-color:var(--grade-hard); }
        .nav-item.grade-advanced.active { color:var(--grade-advanced); border-bottom-color:var(--grade-advanced); }
        .main-content { max-width:1280px; margin:0 auto; padding:28px 24px 60px; }
        .category { margin-bottom:36px; }
        .category-title {
            font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;
            color:var(--text-tertiary); margin-bottom:12px; padding-bottom:8px;
            border-bottom:1px solid var(--border-light);
        }
        .topic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
        .topic-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius-md); padding:14px 16px; cursor:pointer;
            transition:all var(--transition); display:flex; align-items:center;
            gap:12px; box-shadow:var(--shadow-sm); position:relative;
        }
        .topic-card:hover { box-shadow:var(--shadow-md); border-color:#d4d4d4; transform:translateY(-1px); }
        [data-theme="dark"] .topic-card:hover { border-color:#404040; }
        .topic-card.completed { border-left:3px solid var(--grade-easy); }
        .topic-check {
            width:20px; height:20px; border-radius:50%; border:2px solid var(--border);
            display:flex; align-items:center; justify-content:center; font-size:0.6rem;
            flex-shrink:0; transition:all var(--transition); cursor:pointer; color:transparent;
        }
        .topic-card.completed .topic-check { background:var(--grade-easy); border-color:var(--grade-easy); color:#fff; }
        .topic-check:hover { border-color:var(--grade-easy); }
        .topic-info { flex:1; min-width:0; }
        .topic-name { font-weight:500; font-size:0.875rem; color:var(--text); letter-spacing:-0.01em; line-height:1.3; }
        .topic-meta { display:flex; gap:8px; align-items:center; margin-top:3px; }
        .grade-tag { font-size:0.675rem; font-weight:600; padding:2px 8px; border-radius:10px; letter-spacing:0.02em; }
        .tag-easy { background:var(--grade-easy-bg); color:var(--grade-easy); }
        .tag-medium { background:var(--grade-medium-bg); color:var(--grade-medium); }
        .tag-hard { background:var(--grade-hard-bg); color:var(--grade-hard); }
        .tag-advanced { background:var(--grade-advanced-bg); color:var(--grade-advanced); }
        .favourite-btn { background:none; border:none; cursor:pointer; font-size:0.9rem; color:#d4d4d4; padding:4px; transition:color var(--transition); flex-shrink:0; }
        .favourite-btn.active { color:#eab308; }
        .favourite-btn:hover { color:#ca8a04; }
        .empty-state { text-align:center; padding:80px 20px; color:var(--text-tertiary); }
        .empty-state h3 { font-weight:600; color:var(--text-secondary); margin-bottom:8px; }
        .pp-container { max-width:700px; margin:0 auto; }
        .pp-title { font-weight:700; font-size:1.5rem; letter-spacing:-0.02em; margin-bottom:6px; }
        .pp-subtitle { color:var(--text-tertiary); margin-bottom:28px; }
        .tier-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .tier-card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
            padding:28px 24px; cursor:pointer; transition:all var(--transition); text-align:center; box-shadow:var(--shadow-sm);
        }
        .tier-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
        .tier-card h3 { font-weight:700; font-size:1.2rem; letter-spacing:-0.02em; margin-bottom:4px; }
        .tier-card .tier-range { font-size:0.8rem; color:var(--text-tertiary); margin-bottom:12px; }
        .tier-card .tier-badge { display:inline-block; padding:4px 12px; border-radius:12px; font-weight:600; font-size:0.75rem; }
        .badge-higher { background:#eff6ff; color:#1d4ed8; }
        .badge-foundation { background:#f0fdf4; color:#15803d; }
        [data-theme="dark"] .badge-higher { background:#1e3a5f; color:#93c5fd; }
        [data-theme="dark"] .badge-foundation { background:#052e16; color:#6ee7b7; }
        .papers-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:8px; }
        .paper-card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
            padding:20px 16px; cursor:pointer; transition:all var(--transition); text-align:center; box-shadow:var(--shadow-sm);
        }
        .paper-card:hover { box-shadow:var(--shadow-md); border-color:var(--primary); transform:translateY(-1px); }
        .paper-card h4 { font-weight:600; font-size:0.95rem; }
        .paper-card .paper-type { font-size:0.75rem; color:var(--text-tertiary); margin-top:2px; }
        .back-link {
            display:inline-flex; align-items:center; gap:8px; font-weight:500; color:var(--primary);
            cursor:pointer; background:none; border:none; font-size:0.875rem; font-family:inherit;
            margin-bottom:20px; transition:opacity var(--transition); padding:0;
        }
        .back-link:hover { opacity:0.7; }
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
            display:flex; align-items:center; justify-content:center; padding:20px;
            backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
        }
        .modal {
            background:var(--surface); border-radius:var(--radius-xl); max-width:860px; width:100%;
            max-height:88vh; overflow-y:auto; padding:28px 30px; position:relative;
            box-shadow:0 25px 60px rgba(0,0,0,0.25); border:1px solid var(--border);
        }
        .modal-close {
            position:absolute; top:16px; right:20px; background:none; border:none; cursor:pointer;
            color:var(--text-tertiary); width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center; transition:all var(--transition); padding:0;
        }
        .modal-close:hover { background:var(--surface-hover); color:var(--text); }
        .modal h2 { font-weight:700; font-size:1.4rem; letter-spacing:-0.02em; margin-bottom:2px; }
        .modal .modal-subtitle {
            color:var(--text-tertiary); font-size:0.85rem; margin-bottom:16px;
            display:flex; align-items:center; gap:8px; flex-wrap:wrap;
        }
        .tab-nav { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
        .tab-btn {
            padding:9px 16px; border:none; background:transparent; cursor:pointer;
            font-weight:500; color:var(--text-tertiary); font-size:0.825rem; font-family:inherit;
            border-bottom:2px solid transparent; margin-bottom:-1px; transition:all var(--transition);
        }
        .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
        .content-block { margin-bottom:18px; }
        .content-block h4 { font-weight:600; font-size:0.9rem; margin-bottom:6px; color:var(--text); }
        .content-block ul { padding-left:18px; }
        .content-block li { margin-bottom:4px; font-size:0.875rem; color:var(--text-secondary); }
        .content-block p { font-size:0.875rem; color:var(--text-secondary); }
        .example-box {
            background:var(--surface-hover); border-radius:var(--radius-md); padding:16px 18px;
            margin-bottom:14px; border-left:3px solid var(--primary); font-size:0.875rem;
        }
        .example-box .ex-title { font-weight:700; font-size:0.9rem; color:var(--text); margin-bottom:10px; }
        .example-box .question-text { color:var(--text-secondary); margin-bottom:12px; line-height:1.7; }
        .example-box .working { margin-top:10px; }
        .example-box .working-title { font-weight:600; font-size:0.8rem; color:var(--primary); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px; }
        .working-step {
            display:flex; gap:10px; margin-bottom:6px; padding:6px 10px;
            background:var(--surface); border-radius:var(--radius-sm); font-size:0.85rem;
        }
        .step-num { color:var(--primary); font-weight:700; flex-shrink:0; min-width:20px; }
        .step-text { color:var(--text-secondary); }
        .answer-box {
            margin-top:10px; padding:8px 12px; background:var(--primary-light);
            border-radius:var(--radius-sm); font-size:0.875rem;
        }
        .answer-box strong { color:var(--primary); }
        .question-item {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
            padding:16px 18px; margin-bottom:10px; font-size:0.875rem;
        }
        .question-item .q-header { display:flex; align-items:baseline; gap:10px; margin-bottom:8px; }
        .question-item .q-num { font-weight:700; color:var(--text); font-size:0.9rem; }
        .question-item .q-marks { font-size:0.78rem; color:var(--text-tertiary); font-weight:500; }
        .question-item .q-text { color:var(--text-secondary); line-height:1.7; }
        .question-item .q-parts { margin-top:8px; }
        .question-item .q-part { margin-bottom:6px; color:var(--text-secondary); }
        .ms-block {
            background:#fefce8; border-radius:var(--radius-md); padding:16px 18px;
            margin-bottom:12px; font-size:0.85rem; border:1px solid #fde68a;
        }
        [data-theme="dark"] .ms-block { background:#1a1a0a; border-color:#5c4f1a; }
        .ms-block .ms-q { font-weight:700; color:var(--text); margin-bottom:8px; font-size:0.875rem; }
        .ms-step { display:flex; gap:8px; margin-bottom:5px; font-size:0.84rem; }
        .ms-mark { font-weight:700; color:#ca8a04; flex-shrink:0; min-width:28px; }
        [data-theme="dark"] .ms-mark { color:#eab308; }
        .ms-text { color:var(--text-secondary); }
        .ms-answer { margin-top:8px; padding:6px 10px; background:rgba(22,163,74,0.08); border-radius:4px; font-weight:600; color:var(--grade-easy); font-size:0.875rem; }
        .diagram-wrap { margin:12px 0; display:flex; justify-content:center; }
        .diagram-wrap svg { max-width:100%; height:auto; }
        .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:14px; }
        .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-state p { color:var(--text-tertiary); font-size:0.875rem; }
        .error-state { padding:24px; text-align:center; color:var(--text-tertiary); font-size:0.875rem; }
        .hidden { display:none !important; }
        @media (max-width:768px) {
            .topic-grid { grid-template-columns:1fr; }
            .tier-grid { grid-template-columns:1fr; }
            .papers-grid { grid-template-columns:1fr; }
            .header-container { flex-wrap:wrap; height:auto; padding:10px 16px; gap:8px; }
            .search-wrapper { order:3; max-width:100%; flex:1 1 100%; }
            .modal { padding:20px 16px; max-height:92vh; }
            .nav-bar { padding:0 12px; }
            .nav-item { padding:8px 12px; font-size:0.75rem; }
            .tab-btn { padding:8px 10px; font-size:0.75rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo" onclick="navigateTo('topics'); showGrade('all'); return false;">
                <span class="logo-mark">M</span>Edexcel Maths
            </a>
            <div class="search-wrapper">
                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search topics…" oninput="handleSearch()">
            </div>
            <div class="header-actions">
                <button class="btn btn-icon" onclick="toggleTheme()" title="Toggle theme">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button class="btn" onclick="showFavourites()">★ Favourites</button>
                <span class="progress-indicator" id="progressLabel">0%</span>
            </div>
        </div>
        <nav class="nav-bar">
            <button class="nav-item active" data-view="topics" onclick="navigateTo('topics'); showGrade('all')">All Topics</button>
            <button class="nav-item" data-view="pastpapers" onclick="navigateTo('pastpapers')">Past Papers</button>
            <button class="nav-item grade-easy" data-view="grade-1-3" onclick="navigateTo('topics'); showGrade('1-3')">Grade 1–3</button>
            <button class="nav-item grade-medium" data-view="grade-3-5" onclick="navigateTo('topics'); showGrade('3-5')">Grade 3–5</button>
            <button class="nav-item grade-hard" data-view="grade-5-7" onclick="navigateTo('topics'); showGrade('5-7')">Grade 5–7</button>
            <button class="nav-item grade-advanced" data-view="grade-7-9" onclick="navigateTo('topics'); showGrade('7-9')">Grade 7–9</button>
        </nav>
    </header>

    <main class="main-content" id="mainContent"></main>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal" id="modalContent"></div>
    </div>

<script>

const categoryOrder = ['Number','Algebra','Ratio & Proportion','Geometry & Measures','Statistics & Probability'];

let completed = {};
let favourites = {};
try { completed = JSON.parse(localStorage.getItem('gcse_completed') || '{}'); } catch(e){}
try { favourites = JSON.parse(localStorage.getItem('gcse_favourites') || '{}'); } catch(e){}
let currentGrade = 'all';
let currentView = 'topics';
let searchTerm = '';
let ppState = 'tiers';

// Cache for AI-generated content
const contentCache = {};

function save() {
    try { localStorage.setItem('gcse_completed', JSON.stringify(completed)); localStorage.setItem('gcse_favourites', JSON.stringify(favourites)); } catch(e){}
}
function updateProgress() {
    const done = Object.values(completed).filter(v=>v).length;
    const pct = Math.round((done / topicDatabase.length) * 100);
    document.getElementById('progressLabel').textContent = pct + '%';
}
function toggleComplete(id) { completed[id] = !completed[id]; save(); updateProgress(); render(); }
function toggleFavourite(id) { favourites[id] = !favourites[id]; save(); render(); }
function handleSearch() { searchTerm = document.getElementById('searchInput').value.toLowerCase().trim(); render(); }
function navigateTo(view) { currentView = view; if (view==='pastpapers') ppState='tiers'; updateNavHighlight(); render(); }
function showGrade(grade) { currentGrade = grade; currentView = 'topics'; updateNavHighlight(); render(); }
function showFavourites() { currentGrade = 'favourites'; currentView = 'topics'; updateNavHighlight(); render(); }

function updateNavHighlight() {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    if (currentView==='pastpapers') {
        document.querySelector('[data-view="pastpapers"]')?.classList.add('active');
    } else if (currentGrade==='all'||currentGrade==='favourites') {
        document.querySelector('[data-view="topics"]')?.classList.add('active');
    } else {
        const map = {'1-3':'grade-1-3','3-5':'grade-3-5','5-7':'grade-5-7','7-9':'grade-7-9'};
        document.querySelector(`[data-view="${map[currentGrade]}"]`)?.classList.add('active');
    }
}

function getFilteredTopics() {
    let topics = [...topicDatabase];
    if (currentGrade==='favourites') topics = topics.filter(t => favourites[t.id]);
    else if (currentGrade!=='all') topics = topics.filter(t => t.grade===currentGrade);
    if (searchTerm) topics = topics.filter(t => t.name.toLowerCase().includes(searchTerm)||t.category.toLowerCase().includes(searchTerm)||t.grade.includes(searchTerm));
    return topics;
}

function render() {
    if (currentView==='pastpapers') renderPastPapers();
    else renderTopics();
}

function renderTopics() {
    const main = document.getElementById('mainContent');
    const topics = getFilteredTopics();
    if (!topics.length) {
        main.innerHTML = '<div class="empty-state"><h3>No topics found</h3><p>Try a different search or filter.</p></div>';
        updateProgress(); return;
    }
    const grouped = {};
    categoryOrder.forEach(c => grouped[c] = []);
    topics.forEach(t => { const cat = categoryDisplay[t.category]||'Number'; if (grouped[cat]) grouped[cat].push(t); });
    let html = '';
    for (const [cat, items] of Object.entries(grouped)) {
        if (!items.length) continue;
        html += `<section class="category"><div class="category-title">${cat}</div><div class="topic-grid">`;
        items.forEach(t => {
            const tagClass = t.gradeNum<=2?'tag-easy':t.gradeNum<=4?'tag-medium':t.gradeNum<=6?'tag-hard':'tag-advanced';
            html += `<div class="topic-card ${completed[t.id]?'completed':''}" onclick="openTopicModal('${t.id}')">
                <div class="topic-check" onclick="event.stopPropagation();toggleComplete('${t.id}')">${completed[t.id]?'&#10003;':''}</div>
                <div class="topic-info">
                    <div class="topic-name">${t.name}</div>
                    <div class="topic-meta"><span class="grade-tag ${tagClass}">Grade ${t.grade}</span></div>
                </div>
                <button class="favourite-btn ${favourites[t.id]?'active':''}" onclick="event.stopPropagation();toggleFavourite('${t.id}')">${favourites[t.id]?'★':'☆'}</button>
            </div>`;
        });
        html += '</div></section>';
    }
    main.innerHTML = html;
    updateProgress();
}

async function generateAIContent(topic, tabType) {
    const cacheKey = `${topic.id}_${tabType}`;
    if (contentCache[cacheKey]) return contentCache[cacheKey];

    const systemPrompt = `You are an expert Edexcel GCSE Mathematics teacher and examiner. Generate high-quality, realistic GCSE-style content in JSON format. All questions must be original (not copied from any past paper), realistic in style and difficulty, and appropriate for Edexcel GCSE. For any questions requiring diagrams, include an "svg" field with a complete, accurate inline SVG string (viewBox="0 0 300 200" or similar, no external refs, self-contained). Use proper mathematical notation written as plain text (e.g., x^2, sqrt(x), pi). Return ONLY valid JSON, no markdown fences.`;

    let userPrompt = '';
    if (tabType === 'examples') {
        userPrompt = `Generate worked examples for the GCSE topic "${topic.name}" (Grade ${topic.grade}, ${topic.category}).
Return JSON: { "examples": [ { "title": "Example 1 — [question style name]", "question": "full question text", "svg": null or SVG string if diagram needed, "steps": ["step 1 text", "step 2 text", ...], "answer": "final answer" }, ... ] }
Include one example for EVERY distinct question style/type that can appear on Edexcel GCSE for this topic. Each example should be a different style. Make questions realistic with actual numbers. Include SVG diagrams wherever a diagram would appear in a real exam.`;
    } else if (tabType === 'exam') {
        userPrompt = `Generate exam questions for the GCSE topic "${topic.name}" (Grade ${topic.grade}, ${topic.category}).
Return JSON: { "questions": [ { "number": 1, "marks": 3, "text": "question text", "parts": null or ["(a) ...", "(b) ..."], "svg": null or SVG string } , ... ] }
Include EXACTLY 2 questions for every distinct question style/type for this topic. All questions must be original Edexcel-style. Include SVG diagrams where a real exam question would have one. Vary the difficulty from accessible to challenging. No working space, no answers — just the questions.`;
    } else if (tabType === 'markscheme') {
        userPrompt = `Generate a full mark scheme for the GCSE topic "${topic.name}" (Grade ${topic.grade}, ${topic.category}).
Return JSON: { "schemes": [ { "question": "Q1", "marks": 3, "method": ["M1: ...", "A1: ...", "B1: ..."], "answer": "final answer", "notes": "common errors or alternative methods" }, ... ] }
This mark scheme must correspond to 2 questions per question style for this topic (same structure as the exam questions tab). Use proper Edexcel mark scheme notation: M1 for method marks, A1 for accuracy marks, B1 for independent marks. Include common errors and alternative methods.`;
    }

    const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 4000,
            system: systemPrompt,
            messages: [{ role: "user", content: userPrompt }]
        })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const parsed = JSON.parse(clean);
    contentCache[cacheKey] = parsed;
    return parsed;
}

function renderLoading(msg) {
    return `<div class="loading-state"><div class="spinner"></div><p>${msg}</p></div>`;
}

function renderExamplesHTML(data) {
    if (!data.examples || !data.examples.length) return '<div class="error-state">No examples available.</div>';
    return data.examples.map((ex, i) => {
        const svgHtml = ex.svg ? `<div class="diagram-wrap">${ex.svg}</div>` : '';
        const stepsHtml = (ex.steps||[]).map((s,si) => `<div class="working-step"><span class="step-num">${si+1}.</span><span class="step-text">${escHtml(s)}</span></div>`).join('');
        return `<div class="example-box">
            <div class="ex-title">${escHtml(ex.title||'Example '+(i+1))}</div>
            <div class="question-text">${escHtml(ex.question||'')}</div>
            ${svgHtml}
            <div class="working">
                <div class="working-title">Worked Solution</div>
                ${stepsHtml}
                <div class="answer-box"><strong>Answer:</strong> ${escHtml(ex.answer||'')}</div>
            </div>
        </div>`;
    }).join('');
}

function renderExamHTML(data) {
    if (!data.questions || !data.questions.length) return '<div class="error-state">No questions available.</div>';
    return data.questions.map((q, i) => {
        const svgHtml = q.svg ? `<div class="diagram-wrap">${q.svg}</div>` : '';
        const partsHtml = q.parts ? `<div class="q-parts">${q.parts.map(p=>`<div class="q-part">${escHtml(p)}</div>`).join('')}</div>` : '';
        return `<div class="question-item">
            <div class="q-header">
                <span class="q-num">Question ${q.number||i+1}</span>
                <span class="q-marks">[${q.marks||3} marks]</span>
            </div>
            <div class="q-text">${escHtml(q.text||'')}</div>
            ${svgHtml}
            ${partsHtml}
        </div>`;
    }).join('');
}

function renderMarkSchemeHTML(data) {
    if (!data.schemes || !data.schemes.length) return '<div class="error-state">No mark scheme available.</div>';
    return data.schemes.map(s => {
        const methodHtml = (s.method||[]).map(m => {
            const mark = m.match(/^[MAB]\d*/)?.[0] || '';
            const rest = m.replace(/^[MAB]\d*[:\s]*/,'');
            return `<div class="ms-step"><span class="ms-mark">${escHtml(mark)}</span><span class="ms-text">${escHtml(rest)}</span></div>`;
        }).join('');
        return `<div class="ms-block">
            <div class="ms-q">${escHtml(s.question||'')}</div>
            ${methodHtml}
            <div class="ms-answer">✓ ${escHtml(s.answer||'')}</div>
            ${s.notes ? `<div style="margin-top:8px;font-size:0.8rem;color:var(--text-tertiary);"><em>${escHtml(s.notes)}</em></div>` : ''}
        </div>`;
    }).join('');
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function generateLearn(t) {
    const tier = (t.gradeNum <= 5) ? 'Foundation' : 'Higher';
    return `
        <div class="content-block"><h4>Learning Objectives</h4><ul>
            <li>Understand and apply the key methods for ${t.name}</li>
            <li>Solve examination-style problems with accuracy and confidence</li>
            <li>Recognise the different question styles that appear on Edexcel GCSE papers</li>
        </ul></div>
        <div class="content-block"><h4>Specification Coverage</h4><p>${t.name} appears in the Edexcel GCSE Mathematics ${tier} Tier specification. It is examined across all three papers. Marks range from 1–5 per question depending on complexity.</p></div>
        <div class="content-block"><h4>Common Mistakes</h4><ul>
            <li>Not showing sufficient working — method marks require clear steps</li>
            <li>Premature rounding of intermediate values in multi-step problems</li>
            <li>Omitting units in the final answer where required</li>
            <li>Misreading the question — always underline key information</li>
        </ul></div>
        <div class="content-block"><h4>Examination Guidance</h4><p>Present all working clearly and logically. On "show that" or "prove" questions, every step must be justified. Check your answer makes sense in context. Time allocation: roughly 1 minute per mark.</p></div>`;
}

async function loadTabContent(topicId, tabType, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const t = topicDatabase.find(x => x.id === topicId);
    if (!t) return;

    container.innerHTML = renderLoading('Generating content…');
    try {
        const data = await generateAIContent(t, tabType);
        if (tabType === 'examples') container.innerHTML = renderExamplesHTML(data);
        else if (tabType === 'exam') container.innerHTML = renderExamHTML(data);
        else if (tabType === 'markscheme') container.innerHTML = renderMarkSchemeHTML(data);
    } catch(err) {
        console.error(err);
        container.innerHTML = `<div class="error-state">Failed to generate content. Please try again.<br><small>${err.message}</small></div>`;
    }
}

function openTopicModal(id) {
    const t = topicDatabase.find(x => x.id === id);
    if (!t) return;
    const overlay = document.getElementById('modalOverlay');
    const modal = document.getElementById('modalContent');
    const tagClass = t.gradeNum<=2?'tag-easy':t.gradeNum<=4?'tag-medium':t.gradeNum<=6?'tag-hard':'tag-advanced';

    overlay.classList.remove('hidden');
    modal.innerHTML = `
        <button class="modal-close" onclick="closeModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2>${t.name}</h2>
        <p class="modal-subtitle"><span class="grade-tag ${tagClass}">Grade ${t.grade}</span> · ${categoryDisplay[t.category]||t.category}</p>
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="learn">Learn</button>
            <button class="tab-btn" data-tab="examples">Worked Examples</button>
            <button class="tab-btn" data-tab="exam">Exam Questions</button>
            <button class="tab-btn" data-tab="markscheme">Mark Scheme</button>
        </div>
        <div class="tab-panel" data-tab="learn" id="panel-learn">${generateLearn(t)}</div>
        <div class="tab-panel hidden" data-tab="examples" id="panel-examples">${renderLoading('Generating worked examples…')}</div>
        <div class="tab-panel hidden" data-tab="exam" id="panel-exam"></div>
        <div class="tab-panel hidden" data-tab="markscheme" id="panel-markscheme"></div>`;

    // Load examples immediately in background
    loadTabContent(id, 'examples', 'panel-examples');
    // Load exam and markscheme in background too
    loadTabContent(id, 'exam', 'panel-exam');
    loadTabContent(id, 'markscheme', 'panel-markscheme');

    // Tab switching
    modal.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            modal.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            modal.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            this.classList.add('active');
            const panel = modal.querySelector(`[data-tab="${this.dataset.tab}"]`);
            if (panel) panel.classList.remove('hidden');
        });
    });
}

function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch(e){}
}
try {
    const savedTheme = localStorage.getItem('theme')||'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
} catch(e){}

updateProgress();
render();
